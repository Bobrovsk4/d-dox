apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      nodeName: server-node
      containers:
      - name: server
        image: server:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: server-config
        - secretRef:
            name: server-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
        env:
        - name: LOCO_ENV
          value: development
        - name: LOCO_SERVER_RELOAD
          value: "false"
        - name: LOCO_SERVER_BINDING
          value: "0.0.0.0"
        - name: LOCO_SERVER_PORT
          value: "3000"
        - name: LOCO_SERVER_HOST
          value: "localhost"
        - name: S3_ENDPOINT
          value: http://10.43.64.2:9000
        - name: S3_ACCESS_KEY
          valueFrom: { secretKeyRef: { name: minio-creds, key: access-key } }
        - name: S3_SECRET_KEY
          valueFrom: { secretKeyRef: { name: minio-creds, key: secret-key } }
